spring:
  application:
    name: user-service

  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}"

  cloud:
    config:
      enabled: true
      uri: ${CONFIG_SERVER_URL:http://config-server:8888}
      fail-fast: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/msuser}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Fello2020@}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:msuser_admin}
    password: ${RABBITMQ_PASSWORD:msuser_mdp}
    virtual-host: /
    connection-timeout: 5000

rabbitmq:
  exchange:
    user-events: user.events
  routing-key:
    user-registered: user.registered
    expertise-updated: user.expertise.updated

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:user-service}
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}